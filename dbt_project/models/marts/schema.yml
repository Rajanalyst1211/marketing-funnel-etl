version: 2

models:
  - name: mart_funnel_metrics
    description: "Funnel conversion metrics aggregated by marketing channel"
    columns:
      - name: channel
        description: "Marketing channel"
        tests:
          - unique
          - not_null
      - name: total_leads
        description: "Total leads generated by this channel"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue from converted customers"
        tests:
          - not_null
      - name: lead_to_customer_pct
        description: "Percentage of leads that became customers"
      - name: avg_deal_size_usd
        description: "Average revenue per customer"

  - name: mart_channel_roi
    description: "ROI and spend efficiency metrics per marketing channel"
    columns:
      - name: channel
        description: "Marketing channel"
        tests:
          - unique
          - not_null
      - name: roas
        description: "Return on ad spend — revenue divided by spend"
      - name: cost_per_lead_usd
        description: "Average spend to generate one lead"
      - name: cost_per_customer_usd
        description: "Average spend to acquire one customer"